spring.application.name=luma

# Base de datos — usa variables de entorno en Railway, o los valores locales por defecto
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:luma}?useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires&verifyServerCertificate=false
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# Esto muestra en la consola el SQL que Spring está ejecutando por detrás
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Esto obliga a Hibernate a usar los nombres EXACTOS que pongas en @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto (Railway puede asignarlo dinámicamente)
server.port=${PORT:8080}

# Forzar UTF-8 en todas las respuestas HTTP (fix para acentos y emojis en el frontend)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Aumentar límite de subida de archivos para STLs pesados (por defecto es 1MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# URL de Cloudinary para guardar archivos pesados (pasado por Render como variable de entorno)
cloudinary.url=${CLOUDINARY_URL:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.maximum-pool-size=2
