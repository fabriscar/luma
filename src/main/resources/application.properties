spring.application.name=luma

# Base de datos — usa variables de entorno en Railway, o los valores locales por defecto
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:luma}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# Esto muestra en la consola el SQL que Spring está ejecutando por detrás
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Esto obliga a Hibernate a usar los nombres EXACTOS que pongas en @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto (Railway puede asignarlo dinámicamente)
server.port=${PORT:8080}
